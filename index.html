<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Peloponnese Camping — Grouped DB</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0f1419;--bg2:#161c24;--panel:#1b232d;--panel2:#222c38;--line:#2b3744;
  --text:#e7edf3;--muted:#93a1b0;--accent:#2ec4b6;--star:#ffc857;
  --pink:rgba(236,72,153,.22);--fav:#ff5d8f;--p4n:#2ec4b6;--gmaps:#4285f4;
  --shadow:0 4px 18px rgba(0,0,0,.35);
}
html[data-theme="light"]{
  --bg:#eef2f5;--bg2:#e2e8ee;--panel:#fff;--panel2:#f4f7fa;--line:#d8e0e8;
  --text:#16212c;--muted:#5a6b7a;--accent:#159b8e;--star:#e0a200;
  --pink:rgba(236,72,153,.16);--fav:#e23e75;--shadow:0 4px 14px rgba(40,60,80,.14);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
header{display:flex;align-items:center;gap:12px;padding:9px 16px;background:var(--bg2);
  border-bottom:1px solid var(--line);flex-wrap:wrap;flex-shrink:0}
.brand{display:flex;align-items:baseline;gap:8px;font-weight:700;font-size:17px;white-space:nowrap}
.brand .tent{font-size:21px}
.brand small{color:var(--muted);font-weight:500;font-size:12px}
.stats{display:flex;gap:14px;color:var(--muted);font-size:12px;margin-left:4px}
.stats b{color:var(--text);font-size:14px}
.spacer{flex:1}
.controls{display:flex;gap:7px;align-items:center;flex-wrap:wrap}
input,select,button{font-family:inherit;font-size:13px;color:var(--text);background:var(--panel);
  border:1px solid var(--line);border-radius:8px;padding:7px 9px;outline:none}
input::placeholder{color:var(--muted)}
input:focus,select:focus{border-color:var(--accent)}
button{cursor:pointer;transition:.15s}
button:hover{border-color:var(--accent)}
.toggle{background:var(--panel);color:var(--text)}
.toggle.on{background:var(--accent);border-color:var(--accent);color:#04201d;font-weight:600}
.viewsw{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.viewsw button{border:none;border-radius:0;background:var(--panel);padding:7px 11px}
.viewsw button.on{background:var(--accent);color:#04201d;font-weight:600}
#search{min-width:170px}
.layout{flex:1;min-height:0;overflow:hidden}
#content{height:100%;overflow-y:auto;padding:14px}
/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:15px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  box-shadow:var(--shadow);transition:.15s;cursor:pointer;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);border-color:var(--accent)}
.card.seen .body{background:var(--pink)}
.photo{position:relative;height:165px;background:#0b0f14 center/cover no-repeat;flex-shrink:0}
.photo .noimg{display:flex;height:100%;align-items:center;justify-content:center;color:var(--muted);
  font-size:30px;background:linear-gradient(135deg,#1a2430,#222c38)}
.badges{position:absolute;left:9px;top:9px;display:flex;gap:5px}
.badge{font-size:10px;font-weight:600;padding:3px 7px;border-radius:20px;color:#fff;backdrop-filter:blur(3px)}
.badge.p4n{background:rgba(46,196,182,.92)}
.badge.google{background:rgba(66,133,244,.92)}
.badge.count{background:rgba(0,0,0,.6)}
.region-tag{position:absolute;right:9px;top:9px;background:rgba(0,0,0,.6);color:#fff;font-size:10px;
  padding:3px 8px;border-radius:20px;backdrop-filter:blur(3px)}
.fav-btn{position:absolute;right:9px;bottom:9px;width:32px;height:32px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:17px;background:rgba(0,0,0,.55);border:none;color:#fff}
.fav-btn.on{color:var(--fav)}
.body{padding:11px 13px;display:flex;flex-direction:column;flex:1}
.title-row{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.title{font-weight:700;font-size:15px;margin:0 0 3px;line-height:1.25}
.rating{color:var(--star);font-size:13px;white-space:nowrap}
.rating .num{color:var(--muted);margin-left:2px}
.meta{color:var(--muted);font-size:12px;margin-bottom:7px}
.dist{font-size:11.5px;color:var(--accent);font-weight:600;margin:-2px 0 8px}
.desc{font-size:12.5px;line-height:1.45;opacity:.92;margin:0 0 9px}
.svcs{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.svc{font-size:14px}
.actions{display:flex;gap:7px;align-items:center;margin-top:auto;flex-wrap:wrap}
.src-link{font-size:11.5px;text-decoration:none;border:1px solid var(--line);padding:5px 8px;border-radius:8px;display:inline-flex;gap:4px;align-items:center}
.src-link.p4n{color:var(--p4n)}.src-link.google{color:var(--gmaps)}
.src-link:hover{border-color:currentColor}
.seen-toggle{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);margin-left:auto;user-select:none}
.seen-toggle input{accent-color:var(--accent);width:14px;height:14px}
.myrate-row{margin:0 0 9px}
.myrate-w{display:inline-flex;align-items:center;gap:2px;flex-wrap:wrap}
.myrate-w .mlbl{font-size:10px;color:var(--muted);margin-right:6px;text-transform:uppercase;letter-spacing:.4px}
.mstar{cursor:pointer;font-size:19px;color:var(--line);line-height:1;transition:transform .1s,color .1s}
.mstar:hover{transform:scale(1.18)}
.mstar.on{color:#5b9cff}
.mclear{cursor:pointer;color:var(--muted);font-size:10px;margin-left:7px;text-transform:uppercase;letter-spacing:.3px;border:1px solid var(--line);border-radius:6px;padding:2px 6px}
.myrate-lg .mstar{font-size:32px}
.myrate-lg .mlbl{display:none}
.myrate-w.ro .mstar{cursor:default}
.myrate-w.ro .mstar:hover{transform:none}
/* LIST */
.list .card{flex-direction:row;height:108px}
.list .photo{width:150px;height:108px}
.list .body{padding:9px 12px}
.list .desc{display:none}.list .svcs{margin-bottom:5px}
/* MAP */
#map{height:100%;width:100%}
.legend{position:absolute;z-index:500;bottom:16px;right:16px;background:var(--panel);border:1px solid var(--line);
  border-radius:10px;padding:8px 11px;font-size:11px;color:var(--muted);box-shadow:var(--shadow)}
.legend b{color:var(--text);display:block;margin-bottom:4px}
.legend .row{display:flex;align-items:center;gap:6px;margin:2px 0}
.dot{width:11px;height:11px;border-radius:50%;border:1px solid rgba(255,255,255,.4)}
.empty{color:var(--muted);text-align:center;padding:50px}
.leaflet-popup-content{margin:10px 12px;font-family:inherit}
.pop b{font-size:14px}.pop img{width:100%;height:90px;object-fit:cover;border-radius:7px;margin:6px 0}
.pop a{font-size:12px}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:16px;max-width:680px;width:100%;
  max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal .hero{height:280px;background:#0b0f14 center/cover no-repeat;position:relative;border-radius:16px 16px 0 0}
.modal .hero .noimg{display:flex;height:100%;align-items:center;justify-content:center;font-size:50px;color:var(--muted);background:linear-gradient(135deg,#1a2430,#222c38)}
.modal .gallery{display:flex;gap:6px;padding:8px 18px;overflow-x:auto}
.modal .gallery img{height:60px;border-radius:6px;cursor:pointer;object-fit:cover;border:2px solid transparent}
.modal .gallery img.sel{border-color:var(--accent)}
/* CAROUSEL */
.car-btn{position:absolute;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;border:none;font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;z-index:5;padding:0;line-height:1}
.photo:hover .car-btn,.photo.tp .car-btn,.hero:hover .car-btn{display:flex}
.car-prev{left:6px}.car-next{right:6px}
.hero .car-prev{left:10px}.hero .car-next{right:10px}
.car-dots{position:absolute;bottom:6px;left:0;right:0;display:flex;justify-content:center;gap:5px;pointer-events:none;z-index:4}
.car-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.38);transition:.15s}
.car-dot.on{background:#fff}
.modal-x{position:absolute;right:12px;top:12px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);
  color:#fff;border:none;font-size:18px;cursor:pointer}
.modal-body{padding:6px 20px 22px}
.modal h2{margin:6px 0 4px;font-size:22px}
.modal .mmeta{color:var(--muted);font-size:13px;margin-bottom:12px}
.src-card{border:1px solid var(--line);border-radius:11px;padding:11px 13px;margin-bottom:9px;display:flex;
  justify-content:space-between;align-items:center;gap:10px}
.src-card .pl{display:flex;align-items:center;gap:8px;font-weight:600}
.src-head{font-size:12px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin:14px 0 8px}
.amen-grid{display:flex;flex-wrap:wrap;gap:8px;margin:6px 0 4px}
.amen{font-size:12.5px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 9px;display:flex;gap:5px;align-items:center}
.openbtn{background:var(--accent);border:none;color:#04201d;font-weight:600;padding:8px 13px;border-radius:9px;text-decoration:none;font-size:13px}
@media(max-width:560px){.grid{grid-template-columns:1fr}.list .card{height:auto;flex-direction:column}.list .photo{width:100%;height:140px}.list .desc{display:block}}

/* MOBILE */
@media(max-width:680px){
  header{gap:8px;padding:9px 12px}
  .brand{font-size:15px;flex:1 1 100%}
  .brand small{display:none}
  .stats{display:none}
  .spacer{display:none}
  .controls{width:100%;gap:7px}
  input,select{font-size:16px}            /* prevent iOS zoom-on-focus */
  #search{flex:1 1 100%;min-width:0}
  #region,#platform,#minrating,#sort{flex:1 1 40%;min-width:0}
  .controls > button{flex:1 1 30%;padding:9px 8px}
  .viewsw{flex:1 1 100%}
  .viewsw button{flex:1;padding:10px 6px}
  #theme{flex:0 0 46px}
  #content{padding:11px}
  .grid{grid-template-columns:1fr;gap:13px}
  .card:hover{transform:none;border-color:var(--line)}
  .card:active{border-color:var(--accent)}
  .photo{height:200px}
  .src-link{padding:8px 10px;font-size:12.5px}
  .seen-toggle{font-size:12.5px}
  .seen-toggle input{width:17px;height:17px}
  .fav-btn{width:38px;height:38px;font-size:19px}
  .modal-bg{padding:0;align-items:stretch}
  .modal{max-width:none;max-height:100vh;border-radius:0}
  .modal .hero{border-radius:0;height:240px}
  .modal h2{font-size:20px}
  .openbtn{padding:11px 14px;display:inline-block}
  .legend{bottom:10px;right:10px;padding:7px 9px;font-size:10px}
}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="tent">⛺</span> Peloponnese Camping <small>· grouped multi-platform DB</small></div>
  <div class="stats">
    <span><b id="st-total">—</b> campsites</span>
    <span><b id="st-multi">—</b> on 2+ platforms</span>
    <span>avg <b id="st-avg">—</b>★</span>
  </div>
  <div class="spacer"></div>
  <div class="controls">
    <input id="search" placeholder="Search…">
    <select id="region"><option value="">All regions</option></select>
    <select id="platform"><option value="">Any platform</option><option value="park4night">park4night</option><option value="google">Google</option><option value="multi">On both</option></select>
    <select id="minrating"><option value="0">Any ★</option><option value="3.5">3.5+</option><option value="4">4+</option><option value="4.5">4.5+</option></select>
    <select id="sort"><option value="rating">Sort: Rating</option><option value="mine">Sort: ★ Our rating</option><option value="dist">Sort: Nearest Kifisia</option><option value="reviews">Most reviewed</option><option value="name">Name A–Z</option></select>
    <button id="myOnly" class="toggle">★ Rated</button>
    <div class="viewsw">
      <button data-view="grid" class="on">⊞ Grid</button>
      <button data-view="list">≣ List</button>
      <button data-view="map">🗺 Map</button>
    </div>
    <button id="adminBtn" class="toggle" style="display:none">Admin login</button>
    <button id="theme">🌙</button>
  </div>
</header>
<div class="layout"><div id="content"></div></div>

<div class="modal-bg" id="modal"><div class="modal" id="modalInner"></div></div>
<div class="modal-bg" id="login"><div class="modal" style="max-width:340px;padding:22px"><h2 style="margin:0 0 14px;font-size:18px">Admin login</h2><input id="liEmail" placeholder="email" value="kmelissinos@gmail.com" style="width:100%;margin-bottom:8px"><input id="liPass" type="password" placeholder="password" style="width:100%;margin-bottom:10px"><div id="liMsg" style="color:var(--fav);font-size:12px;min-height:16px;margin-bottom:8px"></div><button id="liGo" style="background:var(--accent);color:#04201d;font-weight:600;border:none;padding:10px 14px;border-radius:9px;width:100%">Sign in</button><button id="liCancel" style="width:100%;margin-top:7px;background:transparent">Cancel</button></div></div>

  if(state.view==='map'){renderMap(items);return;}
  content.innerHTML=items.length?`<div class="${state.view==='list'?'list':'grid'}">${items.map(cardHtml).join('')}</div>`:'<div class="empty">No campsites match your filters.</div>';
}
function renderMap(items){
  content.innerHTML='<div id="map"></div><div class="legend"><b>Rating</b><div class="row"><span class="dot" style="background:#2ecc71"></span>4.5★+</div><div class="row"><span class="dot" style="background:#7cc84f"></span>4★+</div><div class="row"><span class="dot" style="background:#f1c40f"></span>3.5★+</div><div class="row"><span class="dot" style="background:#e67e22"></span>lower / n/a</div><div class="row" style="margin-top:4px"><span class="dot" style="background:var(--fav)"></span>Saved</div></div>';
  const streets=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',maxZoom:20});
  const sat=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri, Maxar',maxZoom:20});
  const refLabels=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:20});
  const refRoads=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Transportation/MapServer/tile/{z}/{y}/{x}',{maxZoom:20});
  const hybrid=L.layerGroup([sat,refRoads,refLabels]);
  const startLayer = (window.__mapLayer==='sat')?sat:(window.__mapLayer==='hybrid')?hybrid:streets;
  map=L.map('map',{scrollWheelZoom:true,layers:[startLayer]}).setView([37.4,22.3],8);
  const baseLayers={'\uD83D\uDDFA Streets':streets,'\uD83D\uDEF0 Satellite':sat,'\uD83C\uDF0D Hybrid':hybrid};
  L.control.layers(baseLayers,null,{position:'topright',collapsed:false}).addTo(map);
  map.on('baselayerchange',e=>{window.__mapLayer = e.layer===sat?'sat':(e.layer===hybrid?'hybrid':'streets');});
  markers={};
  items.forEach(d=>{
    const m=L.circleMarker([d.lat,d.lng],{radius:d.platforms.length>1?8:6,weight:2,color:'#0b0f14',fillColor:ratColor(d.rating,!!fav[d.id]),fillOpacity:.95});
    m.on('click',()=>openModal(d.id));
    m.addTo(map);markers[d.id]=m;
  });
  setTimeout(()=>map.invalidateSize(),60);
}
// modal
function openModal(id){
  const d=DATA.find(x=>x.id===id);if(!d)return;
  const cover=d.photos[0];
  const hero=cover?`style="background-image:url('${cover}')"`:'';
  const noimg=cover?'':'<div class="noimg">⛺</div>';
  const gallery=d.photos.length>1?`<div class="gallery">${d.photos.map((p,i)=>`<img src="${p}" class="${i===0?'sel':''}" onclick="selPhoto(this,'${p}')">`).join('')}</div>`:'';
  const heroArrows=d.photos.length>1?`<button class="car-btn car-prev" onclick="modalNav(-1,event)">❮</button><button class="car-btn car-next" onclick="modalNav(1,event)">❯</button>`:'';
  const amen=(d.amenities||[]).map(c=>{const s=SVC[c];return s?`<span class="amen">${s[1]} ${s[0]}</span>`:'';}).join('');
  const srcCards=d.sources.map(s=>`<div class="src-card"><div class="pl">${plBadge(s.platform)} ${s.platform==='park4night'?'park4night':'Google Maps'}</div>
    <div style="text-align:right"><div style="color:var(--star)">${stars(s.rating)} <span style="color:var(--muted)">${s.rating||'n/a'}</span></div>
    <div style="font-size:11px;color:var(--muted)">${s.reviews?s.reviews.toLocaleString()+' reviews':''}</div></div>
    <a class="openbtn" href="${s.url}" target="_blank" rel="noopener">Open ↗</a></div>`).join('');
  document.getElementById('modalInner').innerHTML=`
    <div class="hero" ${hero}>${noimg}${heroArrows}<button class="modal-x" onclick="closeModal()">✕</button></div>
    ${gallery}
    <div class="modal-body">
      <h2>${d.name}</h2>
      <div class="mmeta">${d.region}${d.pc?' · '+d.pc:''} · <span style="color:var(--star)">${stars(d.rating)}</span> ${d.rating||''} · ${d.reviews.toLocaleString()} reviews</div>
      ${d.km?`<div class="dist" style="margin:0 0 12px">${driveStr(d)}</div>`:''}
      <div class="src-head">Our rating</div><div class="myrate-row" style="margin-bottom:2px">${rateStars(d.id,true)}</div>
      ${d.desc?`<p style="line-height:1.5;font-size:14px">${d.desc}</p>`:''}
      <div class="src-head">Listings (${d.sources.length})</div>${srcCards}
      ${amen?`<div class="src-head">Amenities</div><div class="amen-grid">${amen}</div>`:''}
      <div class="src-head">Directions</div>
      <a class="openbtn" href="https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}" target="_blank" rel="noopener">Navigate here ↗</a>
    </div>`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
// CAROUSEL helpers
function carNav(btn,dir,e){e.stopPropagation();carNavEl(btn.closest('.photo'),dir);}
function carNavEl(ph,dir){const ps=JSON.parse(ph.dataset.photos||'[]');if(ps.length<2)return;let i=(+ph.dataset.idx+dir+ps.length)%ps.length;ph.dataset.idx=i;ph.style.backgroundImage=`url('${ps[i]}')`;ph.querySelectorAll('.car-dot').forEach((d,j)=>d.classList.toggle('on',j===i));}
function selPhoto(el,url){document.querySelector('#modalInner .hero').style.backgroundImage=`url('${url}')`;document.querySelectorAll('#modalInner .gallery img').forEach(i=>i.classList.remove('sel'));el.classList.add('sel');}
function modalNav(dir,e){if(e)e.stopPropagation();const imgs=[...document.querySelectorAll('#modalInner .gallery img')];if(!imgs.length)return;let i=imgs.findIndex(x=>x.classList.contains('sel'));if(i<0)i=0;i=(i+dir+imgs.length)%imgs.length;selPhoto(imgs[i],imgs[i].src);}
// Touch-swipe on card photo area
content.addEventListener('touchstart',e=>{const ph=e.target.closest('.photo[data-photos]');if(ph){ph._tx=e.touches[0].clientX;ph.classList.add('tp');}},{passive:true});
content.addEventListener('touchend',e=>{const ph=e.target.closest('.photo[data-photos]');if(ph&&ph._tx!=null){const dx=e.changedTouches[0].clientX-ph._tx;if(Math.abs(dx)>35)carNavEl(ph,dx<0?1:-1);ph._tx=null;setTimeout(()=>ph.classList.remove('tp'),1200);}});
// Touch-swipe on modal hero
(()=>{let sx;document.getElementById('modal').addEventListener('touchstart',e=>{const h=e.target.closest('.hero');if(h)sx=e.touches[0].clientX;},{passive:true});document.getElementById('modal').addEventListener('touchend',e=>{if(sx==null)return;const dx=e.changedTouches[0].clientX-sx;if(Math.abs(dx)>35)modalNav(dx<0?1:-1,null);sx=null;});})();
// Keyboard nav in modal
document.addEventListener('keydown',e=>{if(!document.getElementById('modal').classList.contains('show'))return;if(e.key==='ArrowLeft')modalNav(-1,null);else if(e.key==='ArrowRight')modalNav(1,null);else if(e.key==='Escape')closeModal();});
